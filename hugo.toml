# ==============================================================================
# MENUS - ENGLISH (DEFAULT)
# ==============================================================================

[menus]
  # Main Navigation
  [[menus.main]]
    identifier = 'home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    identifier = 'posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    identifier = 'tools'
    pageRef = '/tools'
    weight = 30

  [[menus.main]]
    identifier = 'tags'
    pageRef = '/tags'
    weight = 40

  # Footer Menu
  [[menus.footer]]
    identifier = 'imprint'
    pageRef = '/impressum'
    weight = 10

# ==============================================================================
# MENUS - GERMAN
# ==============================================================================

[languages.de.menus]
  # Main Navigation
  [[languages.de.menus.main]]
    identifier = 'home'
    name = 'Start'
    pageRef = '/'
    weight = 10

  [[languages.de.menus.main]]
    identifier = 'posts'
    name = 'Beiträge'
    pageRef = '/beitraege'
    weight = 20

  [[languages.de.menus.main]]
    identifier = 'tools'
    name = 'Werkzeuge'
    pageRef = '/werkzeuge'
    weight = 30

  [[languages.de.menus.main]]
    identifier = 'tags'
    name = 'Schlagwörter'
    pageRef = '/tags'
    weight = 40

  # Footer Menu
  [[languages.de.menus.footer]]
    identifier = 'imprint'
    name = 'Impressum'
    pageRef = '/impressum'
    weight = 10

# ==============================================================================
# MODULE CONFIGURATION
# ==============================================================================

[module]
  [module.hugoVersion]
    extended = false
    min = '0.152.0'
