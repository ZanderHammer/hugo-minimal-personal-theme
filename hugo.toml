baseURL = 'https://example.org/'
version = '0.0.1'

# Multilingual Configuration
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    title = "My Hugo Site"
    weight = 1
    
    [languages.en.permalinks]
      posts = "/posts/:slug/"
      tools = "/tools/:slug/"

  [languages.de]
    languageCode = "de"
    languageName = "Deutsch"
    title = "Meine Hugo Seite"
    weight = 2
    
    [languages.de.permalinks]
      posts = "/beitraege/:slug/"
      tools = "/werkzeuge/:slug/"

[pagination]
  pagerSize = 10

[params]
  [params.colors]
    # Light Mode Colors
    primary = "#386641"
    secondary = "#6a994e"
    accent = "#a7c957"
    background = "#f2e8cf"
    highlight = "#bc4749"
    
    # Dark Mode Color Overrides
    [params.colors.dark]
      primary = "#7fc97f"
      secondary = "#9ed98e"
      accent = "#c5e8a1"

  # Footer Configuration
  [params.footer]
    # Enable/disable footer sections
    showCopyright = true       # Display copyright text
    showFooterMenu = true      # Display footer menu links
    showSocialIcons = false     # Display social media icons
    showHugoCredit = true     # Display "Created with ❤️ and Hugo" message
    
    # Copyright text configuration
    # Use {year} placeholder for current year
    # Use {site} placeholder for site title
    copyrightText = "© {year} {site}. All rights reserved."
    
    # Custom footer styling
    [params.footer.style]
      # Font family for footer text (leave empty to use theme default)
      fontFamily = ""
      # Background color override (leave empty to use default)
      backgroundColor = ""
      # Text color override (leave empty to use default)
      textColor = ""
      # Dark mode background color override
      darkBackgroundColor = ""
      # Dark mode text color override
      darkTextColor = ""

# Social Media Icons Configuration
[[params.social]]
  name = "GitHub"
  icon = "fab fa-github"
  url = "https://github.com/yourusername"
  weight = 10

[[params.social]]
  name = "Twitter"
  icon = "fab fa-twitter"
  url = "https://twitter.com/yourusername"
  weight = 20

[[params.social]]
  name = "LinkedIn"
  icon = "fab fa-linkedin"
  url = "https://linkedin.com/in/yourusername"
  weight = 30

[menus]
  [[menus.main]]
    identifier = 'home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    identifier = 'posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    identifier = 'tools'
    pageRef = '/tools'
    weight = 30

  [[menus.main]]
    identifier = 'tags'
    pageRef = '/tags'
    weight = 40

  # Footer Menu - uses same i18n identifier pattern
  [[menus.footer]]
    identifier = 'imprint'
    pageRef = '/impressum'
    weight = 10

[languages.de.menus]
  [[languages.de.menus.main]]
    identifier = 'home'
    name = 'Start'
    pageRef = '/'
    weight = 10

  [[languages.de.menus.main]]
    identifier = 'posts'
    name = 'Beiträge'
    pageRef = '/beitraege'
    weight = 20

  [[languages.de.menus.main]]
    identifier = 'tools'
    name = 'Werkzeuge'
    pageRef = '/werkzeuge'
    weight = 30

  [[languages.de.menus.main]]
    identifier = 'tags'
    name = 'Schlagwörter'
    pageRef = '/tags'
    weight = 40

  # Footer Menu - German translations
  [[languages.de.menus.footer]]
    identifier = 'imprint'
    name = 'Impressum'
    pageRef = '/impressum'
    weight = 10

[module]
  [module.hugoVersion]
    extended = false
    min = '0.152.0'
