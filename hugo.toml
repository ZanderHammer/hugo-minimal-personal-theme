# ==============================================================================
# BASIC CONFIGURATION
# ==============================================================================

baseURL = 'https://example.org/'
version = '0.0.1'

# ==============================================================================
# MULTILINGUAL CONFIGURATION
# ==============================================================================

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    title = "My Hugo Site"
    weight = 1
    
    [languages.en.permalinks]
      posts = "/posts/:slug/"
      tools = "/tools/:slug/"

  [languages.de]
    languageCode = "de"
    languageName = "Deutsch"
    title = "Meine Hugo Seite"
    weight = 2
    
    [languages.de.permalinks]
      posts = "/beitraege/:slug/"
      tools = "/werkzeuge/:slug/"

# ==============================================================================
# PAGINATION
# ==============================================================================

[pagination]
  pagerSize = 10

# ==============================================================================
# THEME PARAMETERS
# ==============================================================================

[params]
  
  # ----------------------------------------------------------------------------
  # Color Scheme
  # ----------------------------------------------------------------------------
  [params.colors]
    # Light Mode Colors
    primary = "#386641"
    secondary = "#6a994e"
    accent = "#a7c957"
    background = "#f2e8cf"
    highlight = "#bc4749"
    
    # Dark Mode Color Overrides
    [params.colors.dark]
      primary = "#7fc97f"
      secondary = "#9ed98e"
      accent = "#c5e8a1"

  # ----------------------------------------------------------------------------
  # Footer Configuration
  # ----------------------------------------------------------------------------
  [params.footer]
    # Enable/disable footer sections
    showCopyright = true
    showFooterMenu = true
    showSocialIcons = true
    showHugoCredit = true
    
    # Copyright text configuration
    # Use {year} placeholder for current year
    # Use {site} placeholder for site title
    copyrightText = "© {year} {site}. All rights reserved."
    
    # Custom footer styling
    [params.footer.style]
      fontFamily = ""
      backgroundColor = ""
      textColor = ""
      darkBackgroundColor = ""
      darkTextColor = ""

  # ----------------------------------------------------------------------------
  # Social Media Icons
  # ----------------------------------------------------------------------------
  [[params.social]]
    name = "Email"
    icon = "fas fa-envelope"
    url = "mailto:your@email.com"
    weight = 10

  [[params.social]]
    name = "GitHub"
    icon = "fab fa-github"
    url = "https://github.com/username"
    weight = 20

  [[params.social]]
    name = "Threads"
    icon = "fab fa-threads"
    url = "https://threads.net/@username"
    weight = 30

  # [[params.social]]
  #   name = "Twitter/X"
